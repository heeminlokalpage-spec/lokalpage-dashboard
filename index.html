<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lokalpage Weekly</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:    #2563EB;
  --blue-l:  #EFF6FF;
  --green:   #16A34A;
  --green-l: #F0FDF4;
  --orange:  #EA580C;
  --orange-l:#FFF7ED;
  --bg:      #F8F9FB;
  --white:   #FFFFFF;
  --border:  #E5E7EB;
  --border2: #F0F2F5;
  --t1:      #0F172A;
  --t2:      #64748B;
  --t3:      #94A3B8;
  --up:      #16A34A;
  --dn:      #DC2626;
  --card-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}

html, body {
  background: var(--bg);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--t1);
  min-height: 100vh;
}

.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

.dash {
  width: 100%;
  background: var(--bg);
}

.hd {
  padding: 16px 20px 13px;
  background: var(--white);
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.hd-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--t1);
  letter-spacing: -.3px;
}
.hd-date {
  font-size: 10px;
  color: var(--t3);
  margin-top: 2px;
  font-weight: 500;
}
.hd-right { display: flex; align-items: center; gap: 8px; }
.live-pill {
  display: flex; align-items: center; gap: 4px;
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
  border-radius: 99px;
  padding: 3px 9px;
  font-size: 10px; font-weight: 700; color: var(--green);
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #22C55E;
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.rbtn {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.rbtn:active { background: var(--border); }
.rbtn svg { width: 11px; height: 11px; stroke: var(--t2); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.rspin { animation: rot .7s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }

.content {
  display: flex;
  flex-direction: column;
}

/* ── SECTION ── */
.sec { padding: 14px 16px 10px; }

.sec-hd {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 10px;
}
.sec-num {
  font-size: 9px;
  font-weight: 800;
  color: var(--t3);
  letter-spacing: .1em;
  text-transform: uppercase;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 6px;
}
.sec-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--t1);
  letter-spacing: -.3px;
}

.hdiv { height: 1px; background: var(--border2); margin: 0 16px; }

/* ── CITY CARD (Last 7 Days) ── */
.city-cards { display: flex; flex-direction: column; gap: 7px; }

.cc {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  box-shadow: var(--card-shadow);
}

/* left accent stripe */
.cc::before {
  content: '';
  width: 3px;
  flex-shrink: 0;
  border-radius: 0;
}
.cc.cebu::before  { background: var(--blue); }
.cc.bohol::before { background: var(--green); }
.cc.bali::before  { background: var(--orange); }

.cc-inner {
  flex: 1;
  display: flex;
  padding: 11px 12px 10px;
  gap: 10px;
  align-items: stretch;
}

/* ── STATS SIDE (left) ── */
.cc-stats {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  width: 120px;
}

.cc-city-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 2px;
}
.cc-city-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cc-city-name {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .01em;
}
.cc.cebu  .cc-city-name { color: var(--blue); }
.cc.bohol .cc-city-name { color: var(--green); }
.cc.bali  .cc-city-name { color: var(--orange); }

/* booking — big number */
.cc-booking {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.cc-book-val {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -.06em;
  line-height: 1;
}
.cc.cebu  .cc-book-val { color: var(--blue); }
.cc.bohol .cc-book-val { color: var(--green); }
.cc.bali  .cc-book-val { color: var(--orange); }
.cc-book-lbl {
  font-size: 8px;
  font-weight: 700;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .07em;
}

.cc-delta {
  font-size: 10px;
  font-weight: 700;
}
.up { color: var(--up); }
.dn { color: var(--dn); }
.fl { color: var(--t3); }

/* sub metrics */
.cc-sub-metrics {
  display: flex;
  gap: 10px;
  margin-top: 2px;
}
.cc-sub { display: flex; flex-direction: column; }
.cc-sub-val {
  font-size: 13px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -.02em;
}
.cc-sub-lbl {
  font-size: 8px;
  font-weight: 600;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-top: 1px;
}

/* ── REVIEW SIDE (right) ── */
.cc-reviews {
  flex: 1;
  border-left: 1px solid var(--border2);
  padding-left: 10px;
  display: flex;
  flex-direction: column;
  gap: 0;
  cursor: pointer;
  min-width: 0;
  align-self: stretch;
}
.cc-reviews:hover { opacity: .85; }

.rv {
  display: flex;
  flex-direction: column;
  flex: 1;
  justify-content: flex-start;
  padding: 6px 0 4px;
  min-height: 0;
}
.rv + .rv { border-top: 1px solid var(--border2); }

.rv-tag {
  font-size: 7.5px;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.rv-tag.pos { color: var(--green); }
.rv-tag.neg { color: var(--orange); }

.rv-text {
  font-size: 9px;
  line-height: 1.5;
  color: var(--t2);
  font-style: italic;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  white-space: pre-line;
  word-break: break-word;
}
.rv-empty {
  font-size: 9px;
  color: var(--t3);
  font-weight: 500;
}

/* ── CHART SECTION ── */
.chart-wrap-outer {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px 10px;
  box-shadow: var(--card-shadow);
  display: flex;
  flex-direction: column;
}
.chart-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.chart-title { font-size: 12px; font-weight: 700; color: var(--t1); letter-spacing: -.2px; }
.legend { display: flex; gap: 10px; }
.leg { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; }
.leg-lbl { font-size: 9px; color: var(--t2); font-weight: 600; }
.chart-inner { position: relative; height: 160px; width: 100%; }
.chart-inner canvas { display: block; }

/* 30-day summary row */
.sum30 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-top: 8px;
}
.sum-card {
  background: var(--white);
  border-radius: 10px;
  padding: 9px 10px;
  border: 1px solid var(--border);
  box-shadow: var(--card-shadow);
}
.sum-val { font-size: 17px; font-weight: 800; color: var(--t1); letter-spacing: -.04em; }
.sum-sub { font-size: 9px; font-weight: 700; margin-top: 1px; }
.sum-lbl { font-size: 8px; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; font-weight: 600; }

/* ── COMPETITOR ── */
.comp-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}
.comp-block {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 11px 9px;
  box-shadow: var(--card-shadow);
}
.comp-city-head {
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 8px;
}
.comp-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.comp-city-name { font-size: 10px; font-weight: 800; }
.comp-item { margin-bottom: 7px; }
.comp-item:last-child { margin-bottom: 0; }
.comp-name-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 3px;
}
.comp-name { font-size: 8.5px; font-weight: 500; color: var(--t2); }
.comp-name.us { font-weight: 800; color: var(--t1); }
.comp-us-tag { font-size: 7px; color: var(--t3); }
.bar-bg { height: 5px; background: var(--bg); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; width: 0; transition: width 1.2s cubic-bezier(.22,1,.36,1); }
.bar-us { background: var(--t1); }
.bar-ot { background: #D1D5DB; }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.5);
  backdrop-filter: blur(6px);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 300;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-bg.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--white);
  border-radius: 24px 24px 0 0;
  border: 1px solid var(--border);
  padding: 22px 20px 40px;
  width: 100%; max-width: 500px;
  transform: translateY(24px);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-bg.open .modal { transform: translateY(0); }
.modal-title { font-size: 16px; font-weight: 800; color: var(--t1); margin-bottom: 14px; letter-spacing: -.3px; }
.ctabs { display: flex; gap: 6px; margin-bottom: 14px; }
.ctab {
  padding: 5px 14px; border-radius: 99px;
  font-size: 11px; font-weight: 700;
  border: 1px solid var(--border);
  background: var(--bg); color: var(--t2);
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.ctab.active.cebu  { background: var(--blue-l);   color: var(--blue);   border-color: #BFDBFE; }
.ctab.active.bohol { background: var(--green-l);  color: var(--green);  border-color: #BBF7D0; }
.ctab.active.bali  { background: var(--orange-l); color: var(--orange); border-color: #FED7AA; }
.mlbl { font-size: 10px; font-weight: 700; color: var(--t2); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 5px; display: block; }
.mta {
  width: 100%; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 10px 12px; font-family: inherit; font-size: 13px;
  color: var(--t1); resize: none; outline: none;
  min-height: 90px; line-height: 1.6; margin-bottom: 10px;
  white-space: pre-wrap; word-break: break-word;
  transition: border-color .2s;
}
.mta:focus { border-color: #93C5FD; background: var(--white); }
.mta::placeholder { color: var(--t3); }
.mbtns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
.mb-cancel {
  padding: 12px; border: 1.5px solid var(--border);
  background: var(--bg); border-radius: 12px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  color: var(--t2); cursor: pointer;
}
.mb-save {
  padding: 12px; border: none;
  background: var(--t1); border-radius: 12px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  color: #fff; cursor: pointer;
}
.mb-cancel:active { opacity: .7; }
.mb-save:active { opacity: .8; }

.loading {
  position: fixed; inset: 0;
  background: rgba(248,249,251,.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  z-index: 100; transition: opacity .3s;
}
.loading.out { opacity: 0; pointer-events: none; }
.spinner {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid var(--border);
  border-top-color: var(--t1);
  animation: rot .65s linear infinite;
}
.loading-lbl { font-size: 11px; font-weight: 600; color: var(--t2); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--t1); color: #fff;
  padding: 8px 18px; border-radius: 99px;
  font-size: 12px; font-weight: 600;
  opacity: 0; transition: all .28s ease;
  z-index: 999; pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 24px; right: 20px;
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--t1); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,.25); z-index: 99; transition: transform .15s;
}
.fab:active { transform: scale(.9); }
.fab svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

@media (min-width: 600px) {
  .page { max-width: 520px; }
}
@media (min-width: 960px) {
  .page { max-width: 560px; }
}
</style>
</head>
<body>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="handleBgClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Featured Reviews</div>
    <div class="ctabs">
      <button class="ctab cebu active" onclick="switchTab('Cebu',this)">Cebu</button>
      <button class="ctab bohol"       onclick="switchTab('Bohol',this)">Bohol</button>
      <button class="ctab bali"        onclick="switchTab('Bali',this)">Bali</button>
    </div>
    <label class="mlbl">↑ Top Feedback</label>
    <textarea class="mta" id="posInput" placeholder="Best review this week…" rows="4"></textarea>
    <label class="mlbl">↓ Key Complaint</label>
    <textarea class="mta" id="negInput" placeholder="Review to address…" rows="4"></textarea>
    <div class="mbtns">
      <button class="mb-cancel" onclick="closeModal()">Cancel</button>
      <button class="mb-save"   onclick="saveReviews()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="fab" onclick="doCapture()">
  <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
</button>

<div class="page dash" id="theDash">

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span class="loading-lbl">Loading…</span>
  </div>

  <!-- HEADER -->
  <div class="hd">
    <div>
      <div class="hd-title">LOKALPAGE WEEKLY DATA</div>
      <div class="hd-date" id="syncTime">DATE: –</div>
    </div>
    <div class="hd-right">
      <div class="live-pill"><span class="live-dot"></span>Live</div>
      <button class="rbtn" onclick="loadData(true)">
        <svg id="rIco" viewBox="0 0 24 24">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="content">

    <!-- 01 LAST 7 DAYS -->
    <div class="sec">
      <div class="sec-hd">
        <span class="sec-num">01</span>
        <span class="sec-title">Last 7 Days</span>
      </div>
      <div class="city-cards" id="cityCards"></div>
    </div>

    <div class="hdiv"></div>

    <!-- 02 LAST 30 DAYS -->
    <div class="sec">
      <div class="sec-hd">
        <span class="sec-num">02</span>
        <span class="sec-title">Last 30 Days</span>
      </div>
      <div class="chart-wrap-outer">
        <div class="chart-top">
          <span class="chart-title">Daily Bookings</span>
          <div class="legend">
            <div class="leg"><div class="leg-dot" style="background:#2563EB"></div><span class="leg-lbl">Cebu</span></div>
            <div class="leg"><div class="leg-dot" style="background:#16A34A"></div><span class="leg-lbl">Bohol</span></div>
            <div class="leg"><div class="leg-dot" style="background:#EA580C"></div><span class="leg-lbl">Bali</span></div>
          </div>
        </div>
        <div class="chart-inner"><canvas id="c30"></canvas></div>
      </div>
      <div class="sum30" id="sum30" style="margin-top:8px"></div>
    </div>

    <div class="hdiv"></div>

    <!-- 03 LAST 6 MONTHS -->
    <div class="sec">
      <div class="sec-hd">
        <span class="sec-num">03</span>
        <span class="sec-title">Monthly Bookings (2026)</span>
      </div>
      <div class="chart-wrap-outer">
        <div class="chart-top">
          <span class="chart-title">Bookings by Month · 2026</span>
          <div class="legend">
            <div class="leg"><div class="leg-dot" style="background:#2563EB"></div><span class="leg-lbl">Cebu</span></div>
            <div class="leg"><div class="leg-dot" style="background:#16A34A"></div><span class="leg-lbl">Bohol</span></div>
            <div class="leg"><div class="leg-dot" style="background:#EA580C"></div><span class="leg-lbl">Bali</span></div>
          </div>
        </div>
        <div class="chart-inner"><canvas id="c6m"></canvas></div>
      </div>
    </div>

    <div class="hdiv"></div>

    <!-- 04 COMPETITOR -->
    <div class="sec">
      <div class="sec-hd">
        <span class="sec-num">04</span>
        <span class="sec-title">Competitor Price Index</span>
      </div>
      <div class="comp-grid" id="compGrid"></div>
    </div>

    <div style="height:16px"></div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzWtC8YAIeITt8dWgW-Qzgew6cgnXoqHTFrRpqIS-s3Tiyahf4iCPjIdsTUsVdGXj8dHg/exec";
const CITIES = ['Cebu','Bohol','Bali'];
const COL  = { Cebu:'#2563EB', Bohol:'#16A34A', Bali:'#EA580C' };
const COLL = { Cebu:'#EFF6FF', Bohol:'#F0FDF4', Bali:'#FFF7ED' };
const CLS  = { Cebu:'cebu', Bohol:'bohol', Bali:'bali' };

// ── pivot 시트 데이터 정규화 ──
// 컬럼 순서: date | 세부(count,guest,review) | 발리(count,guest,review) | 보홀(count,guest,review)
function normalize(raw){
  return raw
    .filter(r => r['date'] && String(r['date']).length === 10)
    .map(r => ({
      date:         String(r['date']),
      cebu_book:    Number(r['cebu_book'])||0,
      cebu_guest:   Number(r['cebu_guest'])||0,
      cebu_review:  Number(r['cebu_review'])||0,
      bali_book:    Number(r['bali_book'])||0,
      bali_guest:   Number(r['bali_guest'])||0,
      bali_review:  Number(r['bali_review'])||0,
      bohol_book:   Number(r['bohol_book'])||0,
      bohol_guest:  Number(r['bohol_guest'])||0,
      bohol_review: Number(r['bohol_review'])||0,
    }));
}

function sample(){
  const today=new Date(); today.setHours(0,0,0,0);
  const rows=[];
  for(let i=59;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    rows.push({
      date: d.toISOString().slice(0,10),
      cebu_book:  Math.floor(Math.random()*10+5),
      cebu_guest: Math.floor(Math.random()*20+10),
      bohol_book: Math.floor(Math.random()*8+3),
      bohol_guest:Math.floor(Math.random()*15+8),
      bali_book:  Math.floor(Math.random()*7+3),
      bali_guest: Math.floor(Math.random()*12+5),
    });
  }
  return rows;
}

function process(rows){
  const today = new Date(); today.setHours(0,0,0,0);
  const ago = n => { const d=new Date(today); d.setDate(today.getDate()-n); return d; };

  // 날짜 범위 필터 (문자열 비교로 정확하게)
  const fmt = d => d.toISOString().slice(0,10);
  const rng = (f,t) => rows.filter(r => r.date >= fmt(f) && r.date <= fmt(t));

  // 오늘 제외, 어제~7일전 = ago(7) ~ ago(1)
  const yesterday = ago(1);
  const r7  = rng(ago(7), yesterday);   // 5/22 ~ 5/28
  const r7p = rng(ago(14), ago(8));     // 5/15 ~ 5/21 (직전 7일)
  const r30 = rng(ago(30), yesterday);  // 4/29 ~ 5/28
  const r30p= rng(ago(60), ago(31));    // 3/30 ~ 4/28

  // 합산 헬퍼
  const sum = (arr, key) => arr.reduce((s,r) => s + (r[key]||0), 0);

  const pct = (rev, book) => book > 0 ? Math.round(rev/book*100) : 0;
  const stats = {
    Cebu:  { bookings: sum(r7,'cebu_book'),  guests: sum(r7,'cebu_guest'),  pb: sum(r7p,'cebu_book'),  pg: sum(r7p,'cebu_guest'),  rate: pct(sum(r7,'cebu_review'), sum(r7,'cebu_book'))  },
    Bohol: { bookings: sum(r7,'bohol_book'), guests: sum(r7,'bohol_guest'), pb: sum(r7p,'bohol_book'), pg: sum(r7p,'bohol_guest'), rate: pct(sum(r7,'bohol_review'),sum(r7,'bohol_book')) },
    Bali:  { bookings: sum(r7,'bali_book'),  guests: sum(r7,'bali_guest'),  pb: sum(r7p,'bali_book'),  pg: sum(r7p,'bali_guest'),  rate: pct(sum(r7,'bali_review'), sum(r7,'bali_book'))  },
  };

  const agg30 = {
    Cebu:  { bookings: sum(r30,'cebu_book'),  pb: sum(r30p,'cebu_book')  },
    Bohol: { bookings: sum(r30,'bohol_book'), pb: sum(r30p,'bohol_book') },
    Bali:  { bookings: sum(r30,'bali_book'),  pb: sum(r30p,'bali_book')  },
  };

  // 30일 일별 차트
  const lbl30 = []; const d30 = {Cebu:[],Bohol:[],Bali:[]};
  for(let i=29;i>=0;i--){
    const d=ago(i), ds=d.toISOString().slice(0,10);
    lbl30.push(d.toLocaleDateString('en-US',{month:'short',day:'numeric'}));
    const row = rows.find(r=>r.date===ds) || {};
    d30.Cebu.push(row.cebu_book||0);
    d30.Bohol.push(row.bohol_book||0);
    d30.Bali.push(row.bali_book||0);
  }

  // 월별 차트 (올해 1월~현재)
  const months=[]; const mo={Cebu:[],Bohol:[],Bali:[]};
  const thisYear=today.getFullYear(), thisMonth=today.getMonth();
  for(let m=0;m<=thisMonth;m++){
    const d=new Date(thisYear,m,1);
    months.push(d.toLocaleDateString('en-US',{month:'short'}));
    const ms=`${thisYear}-${String(m+1).padStart(2,'0')}`;
    const mrows=rows.filter(r=>r.date&&r.date.startsWith(ms));
    mo.Cebu.push(mrows.reduce((s,r)=>s+(r.cebu_book||0),0));
    mo.Bohol.push(mrows.reduce((s,r)=>s+(r.bohol_book||0),0));
    mo.Bali.push(mrows.reduce((s,r)=>s+(r.bali_book||0),0));
  }

  return {stats, agg30, lbl30, d30, months, mo};
}

function fmtDelta(c,p,suffix=''){
  if(p==null||p===0) return '';
  const d=c-p, pct=Math.round(d/p*100);
  const cls=d>0?'up':d<0?'dn':'fl', a=d>0?'↑':d<0?'↓':'→';
  return `<span class="${cls}">${a}${d>0?'+':''}${pct}%${suffix}</span>`;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

async function doCapture(){
  toast('Saving…');
  try{
    const c=await html2canvas(document.getElementById('theDash'),{scale:3,useCORS:true,backgroundColor:'#FFFFFF',logging:false});
    c.toBlob(async blob=>{
      try{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        toast('Copied!');
      } catch {
        const a=document.createElement('a'); a.href=c.toDataURL();
        a.download='lokalpage.png'; a.click(); toast('Saved!');
      }
    },'image/png');
  } catch(e){ toast('Failed'); }
}

async function loadData(manual=false){
  const ld=document.getElementById('loading');
  const ico=document.getElementById('rIco');
  ld.classList.remove('out'); ico.classList.add('rspin');
  try{
    let rows;
    try{
      const res=await fetch(GAS_URL,{redirect:'follow'});
      const raw=await res.json();
      rows=normalize(Array.isArray(raw)?raw:[]);
    } catch {
      rows=await new Promise((resolve,reject)=>{
        const cb='_cb'+Date.now();
        const s=document.createElement('script');
        const t=setTimeout(()=>{reject(new Error('timeout'));s.remove();delete window[cb];},15000);
        window[cb]=data=>{clearTimeout(t);delete window[cb];s.remove();resolve(normalize(Array.isArray(data)?data:[]));};
        s.src=GAS_URL+'?callback='+cb;
        s.onerror=()=>{clearTimeout(t);reject(new Error('load'));};
        document.head.appendChild(s);
      });
    }
    if(!rows||rows.length===0){ rows=sample(); }
    console.log('Data loaded:', rows.length, 'rows, sample:', rows.slice(-3));
    const p=process(rows);
    lastStats=p.stats;
    renderCities(p.stats);
    renderSum30(p.agg30);
    renderC30(p.lbl30,p.d30);
    renderC6m(p.months,p.mo);
    renderComp();
    const now=new Date();
    document.getElementById('syncTime').textContent=
      'DATE: '+now.toLocaleDateString('en-US',{year:'numeric',month:'2-digit',day:'2-digit'});
    if(manual) toast('Refreshed');
  } catch(e){
    console.error(e);
    const p=process(sample());
    lastStats=p.stats;
    renderCities(p.stats); renderSum30(p.agg30);
    renderC30(p.lbl30,p.d30); renderC6m(p.months,p.mo); renderComp();
    toast('Using demo data');
  } finally{
    ld.classList.add('out'); ico.classList.remove('rspin');
  }
}

loadData();
setInterval(()=>loadData(),5*60*1000);
